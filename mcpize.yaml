# MCPize Configuration
# Docs: https://mcpize.com/docs/mcpize-yaml

version: 1

name: "My Dev Tools"
slug: "my-dev-tools"

runtime: typescript
entry: "dist/index.js"

build:
  install: "npm install"
  command: "npm run build"

start:
  type: stdio
  command: "node"
  args:
    - "dist/index.js"

bridge:
  mode: stdio
